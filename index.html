<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="지역 현장을 깊이 있게 보여주는 인터랙티브 뉴스" />
  <meta property="og:type" content="article" />
  <meta property="og:title" content="인터랙티브 뉴스" />
  <meta property="og:description" content="사진과 데이터로 읽는 지역 이야기" />
  <meta property="og:image" content="assets/hero.svg" />
  <title>인터랙티브 뉴스</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="reading-progress" aria-hidden="true"><span id="progressBar"></span></div>

  <header class="site-header" id="siteHeader">
    <a class="brand" href="#top" aria-label="기사 처음으로">
      <span class="brand-mark">C</span>
      <span id="brandText">INTERACTIVE</span>
    </a>
    <button class="nav-toggle" id="navToggle" type="button" aria-expanded="false" aria-controls="storyNav">목차</button>
    <nav class="story-nav" id="storyNav" aria-label="기사 목차"></nav>
  </header>

  <main id="top">
    <section class="hero" id="hero">
      <div class="hero-media" id="heroMedia" role="img" aria-label="대표 이미지"></div>
      <div class="hero-shade"></div>
      <div class="hero-copy">
        <p class="kicker" id="heroKicker"></p>
        <h1 id="heroTitle"></h1>
        <p class="hero-deck" id="heroDeck"></p>
        <p class="hero-byline" id="heroByline"></p>
      </div>
      <a class="scroll-hint" href="#intro" aria-label="본문으로 이동"><span></span>SCROLL</a>
    </section>

    <article>
      <section class="intro prose-section" id="intro">
        <div class="prose reveal">
          <p class="lead" id="introLead"></p>
          <div id="introBody"></div>
        </div>
      </section>

      <section class="stat-band" id="keyNumbers" aria-label="핵심 수치">
        <div class="section-shell">
          <p class="section-label">KEY NUMBERS</p>
          <div class="stat-grid" id="statGrid"></div>
        </div>
      </section>

      <div id="storySections"></div>

      <section class="outro prose-section" id="outro">
        <div class="prose reveal">
          <p class="section-label" id="outroLabel"></p>
          <h2 id="outroTitle"></h2>
          <div id="outroBody"></div>
          <div class="share-row" id="relatedLinks"></div>
        </div>
      </section>
    </article>
  </main>

  <footer class="site-footer">
    <p id="footerText"></p>
  </footer>

  <script src="content.js"></script>
  <script src="script.js"></script>
</body>
</html>
